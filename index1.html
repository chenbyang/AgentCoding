<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chenbyang | GitHub 介紹 & 專案展示網誌 (Aurora Edition)</title>
  
  <!-- 引入 Google Fonts: Space Grotesk (展示標題), Inter (主文字), JetBrains Mono (數據/代碼標籤) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* CSS 變數系統 - 套用 ui-ux-pro-max-skill Aurora UI 規範 */
    :root {
      --aurora-blue: #0080ff;
      --aurora-magenta: #ff1493;
      --aurora-cyan: #00ffff;
      --aurora-purple: #8b00ff;
      
      --bg-deep: #030308;
      --fg-light: #f8fafc;
      --fg-muted: #94a3b8;
      
      /* Liquid Glass 參數 */
      --glass-bg: rgba(10, 10, 20, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: 25px;
      
      --font-display: 'Space Grotesk', 'Noto Sans TC', sans-serif;
      --font-body: 'Inter', 'Noto Sans TC', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      --transition-quick: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 基礎重設 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 255, 255, 0.2) transparent;
    }

    body {
      background-color: var(--bg-deep);
      color: var(--fg-light);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* 捲動條優化 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 255, 255, 0.15);
      border-radius: 100px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--aurora-cyan);
      box-shadow: 0 0 10px var(--aurora-cyan);
    }

    /* ==========================================================================
       1. Aurora UI (極光背景) 與 Canvas 粒子
       ========================================================================== */
    .aurora-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -3;
      overflow: hidden;
      background: radial-gradient(circle at 20% 30%, rgba(139, 0, 255, 0.18), transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(0, 128, 255, 0.18), transparent 50%);
      filter: saturate(1.3);
    }

    /* 動態極光光影球 (Mesh Glow) */
    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      mix-blend-mode: screen;
      opacity: 0.25;
      pointer-events: none;
      animation: float-aurora 25s infinite alternate ease-in-out;
    }

    .orb-cyan {
      top: -10%;
      left: 10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--aurora-cyan) 0%, rgba(0, 0, 0, 0) 70%);
      animation-duration: 18s;
    }

    .orb-magenta {
      bottom: -10%;
      right: 15%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--aurora-magenta) 0%, rgba(0, 0, 0, 0) 70%);
      animation-duration: 22s;
    }

    .orb-blue {
      top: 30%;
      right: -10%;
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, var(--aurora-blue) 0%, rgba(0, 0, 0, 0) 70%);
      animation-duration: 30s;
    }

    @keyframes float-aurora {
      0% {
        transform: translate(0px, 0px) rotate(0deg) scale(1);
      }
      50% {
        transform: translate(80px, -50px) rotate(180deg) scale(1.15);
      }
      100% {
        transform: translate(-50px, 80px) rotate(360deg) scale(0.9);
      }
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -2;
      pointer-events: auto; /* 讓滑鼠可以與之互動 */
    }

    /* ==========================================================================
       2. Liquid Glass (流體玻璃) 面板基底與 Bento Grid
       ========================================================================== */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4),
                  inset 0 1px 1px rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      transition: var(--transition-smooth);
    }

    /* Liquid Glass 的微光折射彩虹線 */
    .glass-panel::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 50%, rgba(0, 255, 255, 0.03) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* 頂部 Bento Grid 排版 */
    .app-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    .bento-header-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 25px;
      margin-bottom: 25px;
    }

    /* ==========================================================================
       3. Header Bento 組件：個人資料卡 (Profile Card)
       ========================================================================== */
    .profile-card {
      padding: 40px;
      display: flex;
      gap: 35px;
      align-items: center;
      position: relative;
    }

    /* 炫光霓虹邊框 */
    .profile-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--aurora-cyan), var(--aurora-blue), var(--aurora-magenta), var(--aurora-purple));
      background-size: 300% 100%;
      animation: border-flow 8s infinite linear;
    }

    @keyframes border-flow {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .avatar-outer {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, var(--aurora-cyan) 0%, var(--aurora-purple) 100%);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.25);
      flex-shrink: 0;
      transition: var(--transition-smooth);
    }

    .avatar-outer:hover {
      transform: scale(1.05) rotate(5deg);
      box-shadow: 0 0 45px rgba(255, 20, 147, 0.4);
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background-color: var(--bg-deep);
      border: 4px solid var(--bg-deep);
    }

    .profile-details {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .profile-title-row {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .profile-name {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 40%, var(--aurora-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .github-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--fg-light);
      text-decoration: none;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: var(--transition-smooth);
    }

    .github-link-btn:hover {
      background: linear-gradient(135deg, var(--aurora-blue), var(--aurora-purple));
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 25px rgba(139, 0, 255, 0.3);
      transform: translateY(-2px);
    }

    .profile-bio {
      font-size: 1.05rem;
      color: var(--fg-muted);
      line-height: 1.7;
      max-width: 650px;
    }

    /* ==========================================================================
       4. Header Bento 組件：總體數據統計卡 (Global Stats Card)
       ========================================================================== */
    .global-stats-card {
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 20px;
    }

    .stats-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stats-item:last-child {
      border-bottom: none;
    }

    .stats-icon-box {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }

    .stats-item:hover .stats-icon-box {
      background: rgba(0, 255, 255, 0.1);
      border-color: rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .stats-icon-box svg {
      width: 20px;
      height: 20px;
      fill: var(--fg-muted);
      transition: var(--transition-smooth);
    }

    .stats-item:hover .stats-icon-box svg {
      fill: var(--aurora-cyan);
    }

    .stats-info {
      display: flex;
      flex-direction: column;
    }

    .stats-number {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }

    .stats-label {
      font-size: 0.8rem;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    /* ==========================================================================
       5. 控制中心 Bento (Control Center Bento)
       ========================================================================== */
    .control-center {
      padding: 30px;
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .control-row-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 20px;
      align-items: center;
    }

    /* 搜尋框 */
    .search-container {
      position: relative;
    }

    .search-box-input {
      width: 100%;
      padding: 15px 20px 15px 55px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: var(--transition-smooth);
    }

    .search-box-input:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--aurora-cyan);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
    }

    .search-box-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      fill: var(--fg-muted);
      pointer-events: none;
      transition: var(--transition-smooth);
    }

    .search-box-input:focus + .search-box-icon {
      fill: var(--aurora-cyan);
      filter: drop-shadow(0 0 5px var(--aurora-cyan));
    }

    /* 下拉選單 */
    .select-container {
      position: relative;
    }

    .select-box {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      padding: 15px 45px 15px 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: #fff;
      font-family: var(--font-body);
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
      transition: var(--transition-smooth);
    }

    .select-box:focus {
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--aurora-cyan);
      box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
    }

    .select-chevron {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 6px solid var(--fg-muted);
      transition: var(--transition-smooth);
    }

    .select-box:focus ~ .select-chevron {
      border-top-color: var(--aurora-cyan);
    }

    /* Slider Toggle */
    .slider-toggle-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      user-select: none;
      transition: var(--transition-smooth);
    }

    .slider-toggle-box:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .slider-label {
      font-size: 0.9rem;
      color: var(--fg-muted);
      font-weight: 600;
    }

    .slider-switch {
      position: relative;
      width: 48px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 100px;
      transition: var(--transition-smooth);
    }

    .slider-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: var(--transition-smooth);
    }

    .slider-checkbox {
      display: none;
    }

    .slider-checkbox:checked + .slider-switch {
      background: linear-gradient(135deg, var(--aurora-cyan), var(--aurora-blue));
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .slider-checkbox:checked + .slider-switch::after {
      left: 27px;
    }

    /* 語言標籤篩選區 */
    .languages-filter-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
    }

    .filter-header-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .filter-badge-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-badge-btn {
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--fg-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: var(--transition-smooth);
    }

    .filter-badge-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.15);
    }

    .filter-badge-btn.active {
      background: linear-gradient(135deg, var(--aurora-cyan) 0%, var(--aurora-blue) 100%);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.25);
    }

    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ==========================================================================
       6. Repos 展示網格 (3D Card Tilt + Liquid Glass)
       ========================================================================== */
    .repos-grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 30px;
      margin-bottom: 50px;
    }

    .perspective-container {
      perspective: 1000px;
    }

    .repo-glass-card {
      height: 100%;
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg);
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
    }

    /* Chromatic Aberration & Highlight Glow Effect */
    .repo-glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: radial-gradient(400px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), rgba(0, 255, 255, 0.08) 0%, transparent 60%);
      z-index: 1;
      pointer-events: none;
    }

    .repo-glass-card:hover {
      border-color: rgba(0, 255, 255, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
                  0 0 25px rgba(0, 255, 255, 0.08);
    }

    /* 3D 深度元件 */
    .card-content-top {
      transform: translateZ(30px);
      position: relative;
      z-index: 2;
    }

    .card-content-bottom {
      transform: translateZ(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    .card-top-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      margin-bottom: 18px;
    }

    .card-repo-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.3;
      letter-spacing: -0.5px;
      word-break: break-all;
    }

    .card-repo-title a {
      color: #fff;
      text-decoration: none;
      transition: var(--transition-quick);
    }

    .card-repo-title a:hover {
      color: var(--aurora-cyan);
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }

    /* 專案來源標籤 */
    .source-pill {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 50px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .source-pill.forked {
      background: rgba(0, 255, 255, 0.08);
      color: var(--aurora-cyan);
      border-color: rgba(0, 255, 255, 0.2);
    }

    .source-pill.original {
      background: rgba(255, 20, 147, 0.08);
      color: var(--aurora-magenta);
      border-color: rgba(255, 20, 147, 0.2);
    }

    .card-repo-description {
      font-size: 0.95rem;
      color: var(--fg-muted);
      line-height: 1.6;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      height: 4.8em;
    }

    /* 卡片底部元數據 */
    .card-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-lang-stats {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 0.85rem;
      color: var(--fg-muted);
    }

    .lang-item-box {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .stats-icons-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .card-icon-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-icon-stat svg {
      width: 14px;
      height: 14px;
      fill: var(--fg-muted);
    }

    .card-view-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--aurora-cyan);
      text-decoration: none;
      transition: var(--transition-smooth);
    }

    .card-view-btn:hover {
      color: #fff;
      transform: translateX(4px);
    }

    .card-view-btn svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      transition: var(--transition-smooth);
    }

    /* ==========================================================================
       7. 骨架屏 (Skeleton Screens)
       ========================================================================== */
    .skeleton-panel {
      height: 290px;
      border-radius: 24px;
      padding: 30px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .shimmer-bar {
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.02) 75%);
      background-size: 200% 100%;
      animation: shimmer-pulse 1.8s infinite ease-in-out;
      border-radius: 6px;
    }

    @keyframes shimmer-pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .shimmer-title { width: 55%; height: 26px; }
    .shimmer-desc { width: 100%; height: 14px; margin-top: 15px; }
    .shimmer-desc.mid { width: 90%; }
    .shimmer-desc.short { width: 70%; }
    
    .shimmer-divider {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 25px;
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .shimmer-meta { width: 35%; height: 16px; }
    .shimmer-btn { width: 20%; height: 16px; }

    /* ==========================================================================
       8. 空白與錯誤狀態 (Status message)
       ========================================================================== */
    .error-empty-container {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;

  <script>
    /* ==========================================================================
       Canvas 動態互動粒子背景邏輯
       ========================================================================== */
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');

    let particles = [];
    const maxParticles = 65;
    const connectionDistance = 110;
    
    // 滑鼠物理場
    const mouse = {
      x: null,
      y: null,
      radius: 130
    };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('mouseout', () => {
      mouse.x = null;
      mouse.y = null;
    });

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 0.4;
        this.vy = (Math.random() - 0.5) * 0.4;
        this.radius = Math.random() * 2 + 1.2;
        this.baseColor = Math.random() > 0.5 ? '0, 255, 255' : '255, 20, 147'; // cyan vs magenta
      }

      update() {
        // 邊界反彈
        if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
        if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;

        this.x += this.vx;
        this.y += this.vy;

        // 滑鼠物理互動（微弱排斥）
        if (mouse.x !== null && mouse.y !== null) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < mouse.radius) {
            const force = (mouse.radius - dist) / mouse.radius;
            const angle = Math.atan2(dy, dx);
            this.x += Math.cos(angle) * force * 1.5;
            this.y += Math.sin(angle) * force * 1.5;
          }
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.baseColor}, 0.5)`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `rgb(${this.baseColor})`;
        ctx.fill();
        ctx.shadowBlur = 0; // 重置陰影避免影響線段
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < maxParticles; i++) {
        particles.push(new Particle());
      }
    }
    initParticles();

    function drawLines() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < connectionDistance) {
            const alpha = (1 - dist / connectionDistance) * 0.12;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0, 255, 255, ${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });

      drawLines();
      requestAnimationFrame(animateParticles);
    }
    animateParticles();


    /* ==========================================================================
       GitHub API 數據獲取與互動邏輯
       ========================================================================== */
    const GITHUB_USERNAME = 'chenbyang';
    const CACHE_TIME_MS = 5 * 60 * 1000; // 5 分鐘快取

    // 全域變數
    let originalRepos = [];
    let activeLanguageFilter = null;

    // UI 綁定
    const reposContainer = document.getElementById('repos-container');
    const searchInput = document.getElementById('search-input');
    const sortSelect = document.getElementById('sort-select');
    const forkCheckbox = document.getElementById('fork-checkbox');
    const forkToggleBox = document.getElementById('fork-toggle-box');
    const languageBadgeList = document.getElementById('language-badge-list');

    // 語言顏色映射表 (補足常見語言的極光色調)
    const languageColors = {
      'JavaScript': '#f1e05a',
      'TypeScript': '#3178c6',
      'HTML': '#e34c26',
      'CSS': '#563d7c',
      'Python': '#3572A5',
      'Vue': '#41b883',
      'C#': '#178600',
      'C++': '#f34b7d',
      'Java': '#b07219',
      'Go': '#00ADD8',
      'Shell': '#89e051',
      'PHP': '#4F5D95',
      'Ruby': '#701516',
      'Swift': '#F05138',
      'Rust': '#dea584'
    };

    // 點擊整個 Slider Toggle Box 可以觸發 checkbox 切換
    forkToggleBox.addEventListener('click', (e) => {
      if (e.target !== forkCheckbox) {
        forkCheckbox.checked = !forkCheckbox.checked;
        filterAndRenderRepos();
      }
    });

    forkCheckbox.addEventListener('change', () => {
      filterAndRenderRepos();
    });

    searchInput.addEventListener('input', filterAndRenderRepos);
    sortSelect.addEventListener('change', filterAndRenderRepos);

    // 抓取 GitHub 數據（帶 LocalStorage 快取）
    async function fetchGitHubData() {
      const cacheKeyUser = `gh_user_${GITHUB_USERNAME}`;
      const cacheKeyRepos = `gh_repos_${GITHUB_USERNAME}`;
      const cacheKeyTime = `gh_cache_time_${GITHUB_USERNAME}`;

      const cachedTime = localStorage.getItem(cacheKeyTime);
      const now = Date.now();

      if (cachedTime && (now - cachedTime < CACHE_TIME_MS)) {
        const cachedUser = JSON.parse(localStorage.getItem(cacheKeyUser));
        const cachedRepos = JSON.parse(localStorage.getItem(cacheKeyRepos));
        if (cachedUser && cachedRepos) {
          console.log("載入快取資料...");
          renderProfile(cachedUser);
          originalRepos = cachedRepos;
          buildLanguageFilters();
          filterAndRenderRepos();
          return;
        }
      }

      console.log("向 API 發送請求...");
      try {
        const [userResponse, reposResponse] = await Promise.all([
          fetch(`https://api.github.com/users/${GITHUB_USERNAME}`),
          fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100`)
        ]);

        if (!userResponse.ok || !reposResponse.ok) {
          throw new Error('無法取得 GitHub 資料，請稍後再試。');
        }

        const userData = await userResponse.json();
        const reposData = await reposResponse.json();

        // 寫入快取
        localStorage.setItem(cacheKeyUser, JSON.stringify(userData));
        localStorage.setItem(cacheKeyRepos, JSON.stringify(reposData));
        localStorage.setItem(cacheKeyTime, now.toString());

        renderProfile(userData);
        originalRepos = reposData;
        buildLanguageFilters();
        filterAndRenderRepos();

      } catch (err) {
        console.error(err);
        renderError(err.message);
      }
    }

    // 渲染個人資料與統計數據
    function renderProfile(user) {
      document.getElementById('user-avatar').src = user.avatar_url;
      document.getElementById('user-name').textContent = user.name || user.login;
      document.getElementById('user-bio').textContent = user.bio || "這位開發者很神祕，沒有留下簡介。";
      
      document.getElementById('stat-repos-count').textContent = user.public_repos;
      document.getElementById('stat-followers-count').textContent = user.followers;
    }

    // 計算並統計 Repo 中的所有程式語言，建立過濾按鈕
    function buildLanguageFilters() {
      const langCounts = {};
      originalRepos.forEach(repo => {
        if (repo.language) {
          langCounts[repo.language] = (langCounts[repo.language] || 0) + 1;
        }
      });

      // 排序語言，只顯示專案數大於 0 的語言
      const sortedLangs = Object.keys(langCounts).sort((a, b) => langCounts[b] - langCounts[a]);
      
      let html = `<button class="filter-badge-btn active" data-lang="all">全部顯示</button>`;
      sortedLangs.forEach(lang => {
        const color = languageColors[lang] || '#858585';
        html += `
          <button class="filter-badge-btn" data-lang="${lang}">
            <span class="badge-dot" style="background-color: ${color}"></span>
            ${lang} (${langCounts[lang]})
          </button>
        `;
      });

      languageBadgeList.innerHTML = html;

      // 註冊語言過濾按鈕的點擊事件
      const buttons = languageBadgeList.querySelectorAll('.filter-badge-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const selectedLang = btn.getAttribute('data-lang');
          activeLanguageFilter = selectedLang === 'all' ? null : selectedLang;
          filterAndRenderRepos();
        });
      });
    }

    // 核心篩選與排序邏輯
    function filterAndRenderRepos() {
      let filtered = [...originalRepos];

      // 1. 統計 Total Stars (對所有 filtered 之前的 Repo 做加總)
      const totalStars = originalRepos.reduce((acc, curr) => acc + (curr.stargazers_count || 0), 0);
      document.getElementById('stat-stars-count').textContent = totalStars;

      // 2. 篩選 Fork
      const showFork = forkCheckbox.checked;
      if (!showFork) {
        filtered = filtered.filter(repo => !repo.fork);
      }

      // 3. 語言過濾
      if (activeLanguageFilter) {
        filtered = filtered.filter(repo => repo.language === activeLanguageFilter);
      }

      // 4. 關鍵字搜尋 (忽略大小寫)
      const query = searchInput.value.toLowerCase().trim();
      if (query) {
        filtered = filtered.filter(repo => 
          (repo.name && repo.name.toLowerCase().includes(query)) ||
          (repo.description && repo.description.toLowerCase().includes(query))
        );
      }

      // 5. 排序
      const sortBy = sortSelect.value;
      if (sortBy === 'stars') {
        filtered.sort((a, b) => b.stargazers_count - a.stargazers_count);
      } else if (sortBy === 'forks') {
        filtered.sort((a, b) => b.forks_count - a.forks_count);
      } else if (sortBy === 'name') {
        filtered.sort((a, b) => a.name.localeCompare(b.name));
      } else {
        // 'pushed' 最近更新
        filtered.sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at));
      }

      renderRepos(filtered);
    }

    // 渲染專案網格
    function renderRepos(repos) {
      if (repos.length === 0) {
        reposContainer.innerHTML = `
          <div class="error-empty-container">
            <svg class="error-icon-box" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </svg>
            <h2 class="error-title">找不到任何專案</h2>
            <p class="error-text">試著調整搜尋條件或更換程式語言標籤再試一次。</p>
          </div>
        `;
        return;
      }

      let html = '';
      repos.forEach(repo => {
        const langColor = languageColors[repo.language] || '#858585';
        const formattedDate = new Date(repo.pushed_at).toLocaleDateString('zh-TW', {
          year: 'numeric',
          month: 'short',
          day: 'numeric'
        });

        html += `
          <div class="perspective-container">
            <div class="glass-panel repo-glass-card" onmousemove="handleCardTilt(event, this)" onmouseleave="handleCardReset(this)">
              <div class="card-content-top">
                <div class="card-top-header">
                  <h3 class="card-repo-title">
                    <a href="${repo.html_url}" target="_blank">${repo.name}</a>
                  </h3>
                  <span class="source-pill ${repo.fork ? 'forked' : 'original'}">
                    ${repo.fork ? 'Forked' : 'Original'}
                  </span>
                </div>
                <p class="card-repo-description">${repo.description || '這個專案尚未新增任何描述與介紹。'}</p>
              </div>

              <div class="card-content-bottom">
                <div class="card-meta-row">
                  <div class="card-lang-stats">
                    ${repo.language ? `
                      <span class="lang-item-box">
                        <span class="badge-dot" style="background-color: ${langColor}"></span>
                        ${repo.language}
                      </span>
                    ` : ''}
                    <div class="stats-icons-row">
                      <span class="card-icon-stat" title="${repo.stargazers_count} Stars">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                        <span>${repo.stargazers_count}</span>
                      </span>
                      <span class="card-icon-stat" title="${repo.forks_count} Forks">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.25z"/></svg>
                        <span>${repo.forks_count}</span>
                      </span>
                    </div>
                  </div>
                  <a href="${repo.html_url}" target="_blank" class="card-view-btn">
                    探索
                    <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg>
                  </a>
                </div>
              </div>
            </div>
          </div>
        `;
      });

      reposContainer.innerHTML = html;
    }

    // 渲染錯誤狀態
    function renderError(message) {
      reposContainer.innerHTML = `
        <div class="error-empty-container">
          <svg class="error-icon-box" viewBox="0 0 24 24" style="fill: var(--aurora-magenta)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
          </svg>
          <h2 class="error-title" style="color: var(--aurora-magenta)">連線發生錯誤</h2>
          <p class="error-text">${message}<br>這可能是因為您在短時間內整理頁面過多次，觸發了 GitHub API 的頻率限制。別擔心，您可以點擊下方按鈕重試，或是稍等五分鐘。</p>
          <button class="action-btn-neon" onclick="fetchGitHubData()">重新嘗試</button>
        </div>
      `;
    }

    /* ==========================================================================
       Liquid Glass 3D Hover & Chromatic Shift 物理特效
       ========================================================================== */
    function handleCardTilt(e, card) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left; // 滑鼠在卡片內的 X 坐標
      const y = e.clientY - rect.top;  // 滑鼠在卡片內的 Y 坐標
      
      // 動態更新光照中心變數 (--mouse-x, --mouse-y)
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);

      // 3D 旋轉計算
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      
      // 最大旋轉 10 度
      const rotateX = ((centerY - y) / centerY) * 10;
      const rotateY = ((x - centerX) / centerX) * 10;

      card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
    }

    function handleCardReset(card) {
      card.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
      card.style.setProperty('--mouse-x', '0px');
      card.style.setProperty('--mouse-y', '0px');
    }

    // 啟動加載
    fetchGitHubData();
  </script>
</body>
</html>
